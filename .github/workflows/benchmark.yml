name: Benchmark Regression

# Manual trigger only.  GitHub Actions runners share cores with other
# tenants and don't expose `taskset`/`numactl`/RT scheduling, so the
# absolute numbers are unreliable for hot-path microbenchmarks.  This
# workflow is here for ad-hoc "did this PR move the needle?" runs
# against a known-good baseline; treat the results as advisory.
# Per-developer runs on isolated hardware (the recipe in CLAUDE.md
# §Benchmark Comparison Workflow) remain the source of truth.

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: "Regression threshold % (default 5)"
        required: false
        default: "5"
      filter:
        description: "Google Benchmark filter regex (default: all)"
        required: false
        default: ""

jobs:
  benchmark:
    name: Run benchmark regression
    # Self-hosted runner on the dev box.  Box is shared with interactive
    # work, so absolute numbers remain noisy — keep the 5% threshold
    # as advisory; a clean run still needs the taskset + chrt recipe
    # from CLAUDE.md §Benchmark Comparison Workflow.
    runs-on: [self-hosted, Linux, X64, orderprocessor-dev]
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v4

      - name: Run benchmark regression
        # scripts/benchmark-regression.sh handles configure, build, run,
        # and compare-vs-baseline.  Threshold and filter come from
        # workflow inputs.
        shell: bash
        run: |
          THRESHOLD="${{ inputs.threshold }}"
          FILTER="${{ inputs.filter }}"
          if [ -n "$FILTER" ]; then
            ./scripts/benchmark-regression.sh --threshold "$THRESHOLD" --filter "$FILTER"
          else
            ./scripts/benchmark-regression.sh --threshold "$THRESHOLD"
          fi

      - name: Upload benchmark baseline (if present)
        # benchmark-regression.sh writes current results to a /tmp file
        # cleaned up on exit; the persistent artifact is the baseline at
        # repo root, only updated when run with --update-baseline.
        # Upload it on success runs so the latest known-good baseline
        # is always retrievable.
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmark_baseline.json
          retention-days: 30
          if-no-files-found: ignore
