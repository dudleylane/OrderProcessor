name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Release build + ctest
    # Self-hosted runner on the dev box.  The same toolchain CI used to
    # install via `dnf install` is already on this host: gcc-toolset-15
    # at /opt/rh/gcc-toolset-15, cmake, ninja, tbb-devel, spdlog-devel,
    # boost-devel, lmdb-devel, numactl-devel.  BUILD_FIX is OFF
    # because the QuickFIX hardened fork is not in any standard repo;
    # BUILD_PG is OFF because libpqxx is optional.
    runs-on: [self-hosted, Linux, X64, orderprocessor-dev]
    env:
      # Activate gcc-toolset-15 the same way the container path did:
      # put its binaries first on PATH, its libs first on LD_LIBRARY_PATH.
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCHMARKS=ON \
            -DBUILD_APP=ON \
            -DBUILD_PG=OFF \
            -DBUILD_FIX=OFF

      - name: Build
        shell: bash
        run: cmake --build build -j"$(nproc)"

      - name: Test
        # -j1: LMDBStorageTest cases share LMDB file paths and fail under
        # parallel ctest (5 of 24 fail with -j$(nproc); all 507 pass
        # serially).  Filing/fixing the test isolation is a separate
        # task; until then, serial runs keep CI green without masking
        # real regressions.
        shell: bash
        run: ctest --test-dir build --output-on-failure -j1
