name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Release build + ctest
    runs-on: [self-hosted, Linux, X64, orderprocessor-dev]
    # Activate gcc-toolset-15 by putting its binaries first on PATH and
    # adding its libraries to LD_LIBRARY_PATH.  No `source enable` script
    # exists at the standard path on Stream 10 — env vars achieve the
    # same effect across every step without wrapping each command.
    env:
      PATH: /opt/rh/gcc-toolset-15/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-15/root/usr/lib64
      CC: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
      CXX: /opt/rh/gcc-toolset-15/root/usr/bin/g++
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # FetchContent pulls GoogleTest, Google Benchmark and
        # nlohmann/json at configure time — needs network access (default
        # in GitHub-hosted runners).  Tests, benchmarks, and the
        # WebSocket app are all on so the bulk of the codebase is
        # exercised by the build.
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCHMARKS=ON \
            -DBUILD_APP=ON \
            -DBUILD_PG=OFF \
            -DBUILD_FIX=OFF

      - name: Build
        shell: bash
        run: cmake --build build -j"$(nproc)"

      - name: Test
        # -j1: LMDBStorageTest cases share LMDB file paths and fail under
        # parallel ctest (5 of 24 fail with -j$(nproc); all 507 pass
        # serially).  Filing/fixing the test isolation is a separate
        # task; until then, serial runs keep CI green without masking
        # real regressions.
        shell: bash
        run: ctest --test-dir build --output-on-failure -j1
