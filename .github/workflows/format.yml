name: Format Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  clang-format:
    name: clang-format dry-run
    # Self-hosted runner on the dev box.  No centos:stream10 container
    # needed — clang-format-22 is already installed on the host (same
    # version CI used to install via `dnf install -y clang-tools-extra`).
    runs-on: [self-hosted, Linux, X64, orderprocessor-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Verify .clang-format conformance
        shell: bash
        run: |
          find src test app bench \
               \( -name '*.h' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format --dry-run -Werror
